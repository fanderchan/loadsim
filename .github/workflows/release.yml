name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}"
          ARCHIVE="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "$OUT_DIR"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X github.com/fanderchan/loadsim/cmd.version=${VERSION}" \
            -o "$OUT_DIR/loadsim" \
            .

          cp README.md LICENSE THIRD_PARTY_NOTICES.md "$OUT_DIR/"
          tar -czf "$ARCHIVE" -C dist "$(basename "$OUT_DIR")"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
