name: 发布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 运行测试
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 构建发布压缩包
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}"
          ARCHIVE="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "$OUT_DIR"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X github.com/fanderchan/loadsim/cmd.version=${VERSION}" \
            -o "$OUT_DIR/loadsim" \
            .

          cp README.md LICENSE THIRD_PARTY_NOTICES.md "$OUT_DIR/"
          tar -czf "$ARCHIVE" -C dist "$(basename "$OUT_DIR")"

      - name: 上传发布压缩包
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  compat-centos7:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载 linux amd64 发布压缩包
        uses: actions/download-artifact@v4
        with:
          name: release-linux-amd64
          path: dist

      - name: 在 CentOS 7 中做冒烟验证
        run: |
          set -euo pipefail

          ARCHIVE="$(find dist -maxdepth 1 -name 'loadsim_*_linux_amd64.tar.gz' | head -n 1)"
          test -n "$ARCHIVE"

          mkdir -p compat
          tar -xzf "$ARCHIVE" -C compat

          EXTRACT_DIR="$(find compat -maxdepth 1 -mindepth 1 -type d | head -n 1)"
          test -n "$EXTRACT_DIR"

          docker run --rm \
            -v "$PWD/$EXTRACT_DIR:/opt/loadsim:ro" \
            centos:7 \
            /bin/sh -lc '/opt/loadsim/loadsim version && /opt/loadsim/loadsim cpu --help >/dev/null && /opt/loadsim/loadsim ram --help >/dev/null && /opt/loadsim/loadsim combo --help >/dev/null'

  release:
    needs:
      - build
      - compat-centos7
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载发布压缩包
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 生成校验文件
        run: |
          set -euo pipefail
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: 组装发布说明
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/compose_release_body.sh "${GITHUB_REF_NAME}" "dist/release-body.md"

      - name: 发布 GitHub 版本
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: dist/release-body.md
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
