name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}"
          ARCHIVE="dist/loadsim_${VERSION}_${GOOS}_${GOARCH}.tar.gz"

          mkdir -p "$OUT_DIR"

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X github.com/fanderchan/loadsim/cmd.version=${VERSION}" \
            -o "$OUT_DIR/loadsim" \
            .

          cp README.md LICENSE THIRD_PARTY_NOTICES.md "$OUT_DIR/"
          tar -czf "$ARCHIVE" -C dist "$(basename "$OUT_DIR")"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  compat-centos7:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download linux amd64 release archive
        uses: actions/download-artifact@v4
        with:
          name: release-linux-amd64
          path: dist

      - name: Smoke test in CentOS 7
        run: |
          set -euo pipefail

          ARCHIVE="$(find dist -maxdepth 1 -name 'loadsim_*_linux_amd64.tar.gz' | head -n 1)"
          test -n "$ARCHIVE"

          mkdir -p compat
          tar -xzf "$ARCHIVE" -C compat

          EXTRACT_DIR="$(find compat -maxdepth 1 -mindepth 1 -type d | head -n 1)"
          test -n "$EXTRACT_DIR"

          docker run --rm \
            -v "$PWD/$EXTRACT_DIR:/opt/loadsim:ro" \
            centos:7 \
            /bin/sh -lc '/opt/loadsim/loadsim version && /opt/loadsim/loadsim cpu --help >/dev/null && /opt/loadsim/loadsim ram --help >/dev/null && /opt/loadsim/loadsim combo --help >/dev/null'

  release:
    needs:
      - build
      - compat-centos7
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Generate auto release notes
        id: auto_notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const response = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: tag,
            });

            fs.mkdirSync('dist', { recursive: true });
            fs.writeFileSync(
              path.join('dist', 'auto-release-notes.md'),
              response.data.body || '',
            );

            core.setOutput('name', response.data.name || tag);

      - name: Compose release notes
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          SUMMARY_FILE=".github/release-notes/${TAG}.md"
          BODY_FILE="dist/release-body.md"

          : > "$BODY_FILE"

          if [ -f "$SUMMARY_FILE" ]; then
            cat "$SUMMARY_FILE" >> "$BODY_FILE"
            printf "\n\n---\n\n## Auto Changelog\n\n" >> "$BODY_FILE"
          fi

          cat dist/auto-release-notes.md >> "$BODY_FILE"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.auto_notes.outputs.name }}
          body_path: dist/release-body.md
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
