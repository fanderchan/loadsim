name: 发布说明同步

on:
  push:
    branches:
      - main
    paths:
      - ".github/release-notes/**"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-notes-sync.yml"
      - "scripts/compose_release_body.sh"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步已有发布说明
        uses: actions/github-script@v7
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');
            const { owner, repo } = context.repo;
            const notesDir = path.join('.github', 'release-notes');
            const files = fs.readdirSync(notesDir)
              .filter((file) => file.endsWith('.md') && file !== 'README.md')
              .sort();

            fs.mkdirSync('dist', { recursive: true });

            for (const file of files) {
              const tag = file.replace(/\.md$/, '');
              let release;

              try {
                release = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag,
                });
              } catch (error) {
                if (error.status === 404) {
                  core.info(`跳过未发布标签: ${tag}`);
                  continue;
                }
                throw error;
              }

              const output = path.join('dist', `${tag}.md`);
              execFileSync('bash', ['scripts/compose_release_body.sh', tag, output], {
                stdio: 'inherit',
                env: {
                  ...process.env,
                  GITHUB_REPOSITORY: `${owner}/${repo}`,
                },
              });

              const body = fs.readFileSync(output, 'utf8');
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: tag,
                name: tag,
                body,
                prerelease: tag.includes('-beta.'),
              });

              core.info(`已同步发布说明: ${tag}`);
            }
