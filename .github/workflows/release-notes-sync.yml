name: Release Notes Sync

on:
  push:
    branches:
      - main
    paths:
      - ".github/release-notes/**"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-notes-sync.yml"
      - "cmd/version.go"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail

          VERSION="$(go run . version | awk '{print $2}')"
          TAG="v${VERSION}"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check GitHub release exists
        if: steps.tag.outputs.exists == 'true'
        id: release_check
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw error;
            }

      - name: Compose release notes
        if: steps.release_check.outputs.exists == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          bash scripts/compose_release_body.sh "${{ steps.tag.outputs.tag }}" "dist/release-body.md"

      - name: Update GitHub release
        if: steps.release_check.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: dist/release-body.md
          prerelease: ${{ contains(steps.tag.outputs.tag, '-beta.') }}
