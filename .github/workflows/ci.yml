name: 持续集成

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 检查格式
        run: test -z "$(gofmt -l .)"

      - name: 运行 vet
        run: go vet ./...

      - name: 运行测试
        run: go test ./...

      - name: 构建
        run: go build ./...
