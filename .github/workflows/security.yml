name: 安全检查

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 安装 govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: 运行 govulncheck
        run: govulncheck ./...
